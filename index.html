<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Ads – Hosted Page</title>

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  Esta página é hospedada no SEU domínio verificado.         ║
    ║  O AdSense funciona aqui porque tem origem web real.        ║
    ║  A extensão do VSCodium carrega esta página via iframe.     ║
    ╚══════════════════════════════════════════════════════════════╝

    1. Substitua o data-ad-client e data-ad-slot pelos seus do AdSense.
    2. Hospede em https://seu-dominio.com/ads
    3. Configure a URL em: VSCodium → Settings → Agent Ads → Ad Page URL
  -->

  <!-- Google AdSense script (substitua pelo seu publisher ID) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
    crossorigin="anonymous"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #1e1e1e; /* match VSCode dark theme */
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* AdSense responsive unit – ocupa todo o espaço do iframe */
    .ad-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 4px;
    }

    /* Fallback estético enquanto o AdSense não carrega */
    .ad-placeholder {
      width: 100%;
      height: 120px;
      border: 1px dashed #444;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-family: sans-serif;
      font-size: 11px;
    }
  </style>
</head>
<body>

  <div class="ad-wrapper">
    <!--
      Bloco AdSense "display" responsivo.
      Substitua data-ad-client e data-ad-slot pelos seus valores.
    -->
    <ins class="adsbygoogle"
         style="display:block; width:100%; height:120px;"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <script>
    /*
      Futuramente: postar eventos de impression/click de volta
      para a extensão via window.parent.postMessage.
      Por ora, o iframe reporta load via onload no lado da extensão.
    */
    window.addEventListener('load', () => {
      // Notifica o iframe pai (extensão) que carregou
      try {
        window.parent.postMessage({ type: 'ad-page-ready' }, '*');
      } catch (_) {}
    });
  </script>
</body>
</html>
